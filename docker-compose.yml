version: '3.8'

services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "22181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.4.0
    depends_on:
      - zookeeper
    ports:
      - "29092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181

      # ESSENCIAL: advertised listeners usam o nome do serviço para clientes internos
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT

      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions.sh", "--bootstrap-server", "localhost:9092"]
      interval: 10s
      retries: 5

  postgres-user:
    image: postgres:14-alpine
    environment:
      - POSTGRES_DB=user_db
      - POSTGRES_USER=${POSTGRES_USER_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD_USER:-maria}
    volumes:
      - pgdata_user:/var/lib/postgresql/data
      - ./user/sql/init.sql:/docker-entrypoint-initdb.d/init-user.sql:ro

  postgres-tx:
    image: postgres:14-alpine
    environment:
      - POSTGRES_DB=tx_db
      - POSTGRES_USER=${POSTGRES_USER_TX:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD_TX:-maria}
    volumes:
      - pgdata_tx:/var/lib/postgresql/data
      - ./transaction-service/sql/init.sql:/docker-entrypoint-initdb.d/init-tx.sql:ro

  postgres-analytics:
    image: postgres:14-alpine
    environment:
      - POSTGRES_DB=analytics_db
      - POSTGRES_USER=${POSTGRES_USER_ANALYTICS:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD_ANALYTICS:-maria}
    volumes:
      - pgdata_analytics:/var/lib/postgresql/data
      - ./analytics-service/sql/init.sql:/docker-entrypoint-initdb.d/init-analytics.sql:ro

  api-gateway:
    build:
      context: ./api-gateway
    ports:
      - '8080:8080'
    environment:
      - SPRING_PROFILES_ACTIVE=${SPRING_PROFILES_ACTIVE:-docker}
      - JWT_SECRET=${JWT_SECRET}
    depends_on:
      - user
      - transaction-service
      - analytics-service

  user:
    build:
      context: ./user
    ports:
      - '8001:8001'
    environment:
      - SPRING_PROFILES_ACTIVE=${SPRING_PROFILES_ACTIVE:-docker}
      - JWT_SECRET=${JWT_SECRET}
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres-user:5432/user_db
      - SPRING_DATASOURCE_USERNAME=${POSTGRES_USER_USER}
      - SPRING_DATASOURCE_PASSWORD=${POSTGRES_PASSWORD_USER}
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
    depends_on:
      - postgres-user
      - kafka

  transaction-service:
    build:
      context: ./transaction-service
    ports:
      - '8002:8002'
    environment:
      - SPRING_PROFILES_ACTIVE=${SPRING_PROFILES_ACTIVE:-docker}
      - JWT_SECRET=${JWT_SECRET}
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres-tx:5432/tx_db
      - SPRING_DATASOURCE_USERNAME=${POSTGRES_USER_TX}
      - SPRING_DATASOURCE_PASSWORD=${POSTGRES_PASSWORD_TX}
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
    depends_on:
      - postgres-tx
      - kafka

  analytics-service:
    build:
      context: ./analytics-service
    ports:
      - '8003:8003'
    environment:
      - SPRING_PROFILES_ACTIVE=${SPRING_PROFILES_ACTIVE:-docker}
      - JWT_SECRET=${JWT_SECRET}
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres-analytics:5432/analytics_db
      - SPRING_DATASOURCE_USERNAME=${POSTGRES_USER_ANALYTICS}
      - SPRING_DATASOURCE_PASSWORD=${POSTGRES_PASSWORD_ANALYTICS}
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
    depends_on:
      - postgres-analytics
      - kafka

volumes:
  pgdata_user:
  pgdata_tx:
  pgdata_analytics:
