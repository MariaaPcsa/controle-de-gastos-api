server:
  port: 0

spring:
  config:
    activate:
      on-profile: test

  datasource:
    url: jdbc:h2:mem:tx_db
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  h2:
    console:
      enabled: true
      path: /h2-console

  kafka:
    bootstrap-servers: ${spring.embedded.kafka.brokers}

# 🔥 ESSENCIAL (faltava isso)
jwt:
  secret: test-secret-12345678901234567890
  expiration: 3600000