spring:
  config:
    activate:
      on-profile: docker

  datasource:
    url: jdbc:postgresql://postgres-tx:5432/tx_db
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:maria}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    database-platform: org.hibernate.dialect.PostgreSQLDialect

  kafka:
    bootstrap-servers: kafka:9092

external:
  brasilapi:
    url: ${BRASILAPI_URL:https://brasilapi.com.br/api}
  mockbank:
    url: ${MOCKBANK_URL:https://mockbank.local}

jwt:
  secret: ${JWT_SECRET:replace_with_secure_secret_please}
  expiration: 3600000

server:
  port: 8002
