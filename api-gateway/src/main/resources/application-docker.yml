spring:
  config:
    activate:
      on-profile: docker

server:
  port: 8080

services:
  user:
    url: http://user:8001
  transaction:
    url: http://transaction-service:8002
  analytics:
    url: http://analytics-service:8003

jwt:
  secret: ${JWT_SECRET:replace_with_secure_secret_please}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

