services:
  users-db:
    image: postgres:14
    container_name: usersdb
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: maria
      POSTGRES_DB: usersdb
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    networks:
      - app-tier

volumes:
  db_data:

networks:
  app-tier: