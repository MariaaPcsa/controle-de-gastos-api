spring:
  config:
    activate:
      on-profile: docker

  datasource:
    # 🔥 NUNCA use localhost dentro do Docker
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://postgres-user:5432/user_db}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:maria}
    driver-class-name: org.postgresql.Driver

    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      idle-timeout: 30000
      max-lifetime: 2000000
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: ${DDL_AUTO:update}
    show-sql: ${SHOW_SQL:true}
    properties:
      hibernate:
        format_sql: true
    database-platform: org.hibernate.dialect.PostgreSQLDialect

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:kafka:9092}
    consumer:
      group-id: user-service-group
      auto-offset-reset: earliest

jwt:
  secret: ${JWT_SECRET:dev-secret-123456789012345678901234567890}
  expiration: ${JWT_EXPIRATION:3600000}

server:
  port: 8001

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    root: INFO
    org.springframework: INFO
    org.apache.kafka: WARN
    org.hibernate.SQL: DEBUG